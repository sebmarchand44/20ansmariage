<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Invitation — 20 ans de Mariage</title>
  <meta name="description" content="Invitation — 20 ans de Mariage Karen & Seb" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Smooth scrolling moderne */
    html {
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    
    body {
      overscroll-behavior-y: contain;
    }
    
    /* Indicateur de scroll */
    .scroll-indicator {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--rsvp));
      transform-origin: left;
      transform: scaleX(0);
      z-index: 1000;
      transition: transform 0.1s ease-out;
    }
    
    /* Animation d'apparition au chargement */
    .card > * {
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
    }
    
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    
    .badge { animation-delay: 0.1s; }
    h1 { animation-delay: 0.2s; }
    .hero { animation-delay: 0.3s; }
    .info { animation-delay: 0.4s; }
    .buttons { animation-delay: 0.5s; }
    .map { animation-delay: 0.6s; }
    .footer { animation-delay: 0.7s; }
  </style>
</head>
<body>
  <!-- Indicateur de progression du scroll -->
  <div class="scroll-indicator" id="scrollIndicator"></div>
  <div class="container">
    <div class="card">
      <div class="badge">🥂 Invitation</div>
      <h1>20 ans de Mariage — Karen & Seb 💐</h1>
      
      <!-- Image principale en style "carte" + parallax -->
      <div class="hero card-look">
        <div class="hero-parallax">
          <img
            src="assets/holycross_2026.jpg"
            alt="Lieu de l’événement — 20 ans de Mariage Karen & Seb"
            class="hero-img"
            width="1600"
            height="1067"
            loading="lazy"
            decoding="async"
          />
        </div>
      </div>

      <div class="info">
        <p><strong>📅 Quand ?</strong> Samedi 25 juillet 2026 à 13h</p>
        <p><strong>📍 Où ?</strong> Village Vigneron, 4 La Plessisière, 44330 La Chapelle-Heulin, France</p>
        <p>Fêtons ensemble nos 20 ans de mariage !</p>
      </div>

      <!-- 👉 Bouton RSVP uniquement -->
      <div class="buttons">
        <a class="button rsvp" href="rsvp.html">Confirmer ma présence (RSVP)</a>
      </div>

      <!-- Carte Google Maps -->
      <div class="map">
        <iframe
          src="https://www.google.com/maps?q=Village%20Vigneron%2C%204%20La%20Plessisi%C3%A8re%2C%2044330%20La%20Chapelle-Heulin%2C%20France&output=embed"
          width="100%" height="260" style="border:0" loading="lazy" allowfullscreen
          referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>

    </div>
  </div>

  <script>
    // ===== Indicateur de scroll =====
    const scrollIndicator = document.getElementById('scrollIndicator');
    
    function updateScrollIndicator() {
      const winScroll = document.documentElement.scrollTop || document.body.scrollTop;
      const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      const scrolled = (winScroll / height);
      scrollIndicator.style.transform = `scaleX(${scrolled})`;
    }
    
    window.addEventListener('scroll', updateScrollIndicator, { passive: true });
    
    // ===== Parallax doux, désactivé si "reduce motion" =====
    (function() {
      const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduce) return;

      const wrapper = document.querySelector('.hero-parallax');
      const img = document.querySelector('.hero-img');
      if (!wrapper || !img) return;

      let inView = false;
      let lastY = 0;
      const strength = 0.12; // intensité du mouvement (plus petit = plus subtil)

      // On observe l’entrée/sortie de la section pour n’animer que quand elle est visible
      const io = new IntersectionObserver(entries => {
        entries.forEach(e => { inView = e.isIntersecting; });
      }, { threshold: 0 });

      io.observe(wrapper);

      const tick = () => {
        if (inView) {
          const rect = wrapper.getBoundingClientRect();
          // distance depuis le centre de l’écran ([-0.5..0.5] environ)
          const progress = (rect.top + rect.height * 0.5 - window.innerHeight * 0.5) / window.innerHeight;
          // déplacement vertical
          const targetY = progress * (rect.height * strength);
          // interpolation légère pour la fluidité
          lastY += (targetY - lastY) * 0.08;
          img.style.transform = `translate3d(0, ${lastY.toFixed(2)}px, 0)`;
        }
        requestAnimationFrame(tick);
      };

      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
``
