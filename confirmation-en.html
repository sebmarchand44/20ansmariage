<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Thank You — RSVP</title>
  <meta name="description" content="Thank you for your RSVP" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Smooth scrolling moderne */
    html {
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    
    body {
      overscroll-behavior-y: contain;
    }
    
    /* Animation d'apparition */
    .card > * {
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
    }
    
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    
    .badge { animation-delay: 0.1s; }
    h1 { animation-delay: 0.2s; }
    p { animation-delay: 0.3s; }
    .recap { animation-delay: 0.4s; }
    .btn { animation-delay: 0.5s; }
    
    /* Language switcher */
    .lang-switcher {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 8px;
      z-index: 100;
    }
    .lang-switcher a {
      padding: 6px 12px;
      background: rgba(255,255,255,0.9);
      border-radius: 8px;
      text-decoration: none;
      color: var(--ink);
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .lang-switcher a:hover {
      background: var(--accent);
      color: white;
    }
    .lang-switcher a.active {
      background: var(--accent);
      color: white;
    }
    
    /* Styles spécifiques à la page de confirmation */
    .recap{margin-top:12px;text-align:left;background:#f8f9fa;border:1px solid #e9ecef;border-radius:12px;padding:12px}
    .row{display:flex;justify-content:space-between;gap:8px;margin:4px 0}
    .muted{opacity:.8;font-size:.95rem}
    .btn{
      display:inline-block;margin-top:14px;background:var(--accent);color:#fff;text-decoration:none;
      padding:12px 16px;border-radius:12px;font-weight:600
    }
    .btn:hover{filter:brightness(.96)}
  </style>
</head>
<body>
  <!-- Language switcher -->
  <div class="lang-switcher">
    <a href="confirmation.html">🇫🇷 FR</a>
    <a href="confirmation-en.html" class="active">🇮🇪 EN</a>
  </div>
  
  <div class="container">
    <div class="card">
      <div class="badge">✅ Confirmation</div>
      <h1>Thank You!</h1>
      <p>Your confirmation has been successfully recorded.</p>
      <div id="recap" class="recap" style="display:none">
        <div class="muted">Summary:</div>
        <div class="row"><span>Adults (attending)</span><strong id="rA">—</strong></div>
        <div class="row"><span>Children < 13 (attending)</span><strong id="rK">—</strong></div>
        <div class="row"><span>Family / Name</span><strong id="rN">—</strong></div>
        <div class="row"><span>Staying overnight</span><strong id="rS">—</strong></div>
        <div id="sleepBlock" style="display:none">
          <hr style="border:none;border-top:1px solid #e9ecef;margin:8px 0">
          <div class="row"><span>Overnight — Adults (€36)</span><strong id="rNA">—</strong></div>
          <div class="row"><span>Overnight — Children (€26)</span><strong id="rNK">—</strong></div>
          <div class="row"><span>Overnight total</span><strong id="rNT">—</strong></div>
        </div>
      </div>

      <a class="btn" href="index-en.html">← Back to invitation</a>
    </div>
  </div>

  <script>
    // Read the summary from rsvp-en.html (if present)
    try {
      const s = sessionStorage.getItem('rsvp_summary');
      if (s) {
        const data = JSON.parse(s);
        const $ = id => document.getElementById(id);
        const show = elId => ($(elId).style.display = '');

        $('rA').textContent  = data.attAdults ?? '0';
        $('rK').textContent  = data.attKids ?? '0';
        $('rN').textContent  = data.name || '—';
        $('rS').textContent  = data.sleep || '—';

        if (data.sleep === 'Yes' || data.sleep === 'Oui') {
          $('rNA').textContent = data.nightAdults ?? '0';
          $('rNK').textContent = data.nightKids ?? '0';
          $('rNT').textContent = (data.nightTotal ?? 0) + ' €';
          show('sleepBlock');
        }
        show('recap');
        // Optional: clear after display
        // sessionStorage.removeItem('rsvp_summary');
      }
    } catch (e) {
      /* silent */
    }
  </script>
</body>
</html>
