<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Merci — RSVP</title>
  <meta name="description" content="Merci pour votre RSVP" />
  <style>
    :root{--bg:#fffaf6;--card:#fff;--ink:#2b2b2b;--accent:#c77dff}
    *{box-sizing:border-box}
    body{
      margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg);color:var(--ink)
    }
    .wrap{max-width:640px;margin:28px auto;padding:16px}
    .card{
      background:var(--card);border-radius:16px;box-shadow:0 6px 24px rgba(0,0,0,.08);padding:22px;
      text-align:center
    }
    h1{font-size:clamp(1.4rem,1rem+1.6vw,2rem);margin:.2rem 0 .6rem}
    p{line-height:1.6;margin:0.25rem 0}
    .recap{margin-top:12px;text-align:left;background:#f8f9fa;border:1px solid #e9ecef;border-radius:12px;padding:12px}
    .row{display:flex;justify-content:space-between;gap:8px;margin:4px 0}
    .muted{opacity:.8;font-size:.95rem}
    a.btn{
      display:inline-block;margin-top:14px;background:var(--accent);color:#fff;text-decoration:none;
      padding:12px 16px;border-radius:12px;font-weight:600
    }
    a.btn:hover{filter:brightness(.96)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>✅ Merci !</h1>
      <p>Votre confirmation a bien été envoyée.</p>
